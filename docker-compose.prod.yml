name: thumb-ledger

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    # nginx 不对外暴露端口，仅对 cloudflared 容器可见
    networks:
      - internal

  backend:
    image: thumb-ledger-backend:prod
    build:
      context: ./backend
      target: prod
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - internal

  frontend:
    image: thumb-ledger-frontend:prod
    build:
      context: ./frontend
      target: prod
    networks:
      - internal

  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file: .env.prod
    depends_on:
      - nginx
    networks:
      - internal

  objstore:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file: .env.prod
    volumes:
      - minio_data:/data
    networks:
      - internal

volumes:
  pgdata_prod:
  minio_data:

networks:
  internal:
    driver: bridge

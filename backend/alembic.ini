# Alembic 配置文件
# 通过 env.py 从环境变量读取 DATABASE_URL，此处 sqlalchemy.url 留空

[alembic]
# 迁移脚本目录
script_location = alembic

# 迁移文件名模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区
timezone = UTC

# 是否截断长脚本描述
truncate_slug_length = 40

# sqlalchemy.url 在 env.py 中从 DATABASE_URL 环境变量读取，此处留空
sqlalchemy.url =

# 是否在 migration 输出中包含迁移版本
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
